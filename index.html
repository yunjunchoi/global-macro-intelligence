      limit:"1만건/일",
      bestFor:"외국인 증권투자 실제 현황",
      color:T.teal,url:"https://data.fss.or.kr",
      getKey:"① data.fss.or.kr → 공공데이터포털 (data.go.kr) → '금융감독원' 검색 → 신청",
      inputVar:"FSS_KEY",
      liveData: live.fssLive ? ["외국인 증권투자 데이터 연결됨"] : null,
      series:[
        {code:"외국인주식보유현황", name:"외국인 주식 순매수·잔고", unit:"억원/월"},
        {code:"외국인채권보유현황", name:"외국인 국채 보유액",       unit:"억원/월"},
      ]
    },
  ];

  return(
    <div style={{overflowY:"auto",height:"100%",padding:"16px 20px"}}>
      <div style={{marginBottom:16}}>
        <div style={{fontSize:13,color:T.accent,fontFamily:"Space Grotesk",fontWeight:700,marginBottom:4}}>
          📡 실제 데이터 API 연결 현황
        </div>
        <div style={{fontSize:8.5,color:T.muted,fontFamily:"JetBrains Mono",lineHeight:1.8}}>
          ECOS 키와 FSS 키를 입력하면 가상 시뮬레이션 수치가 <span style={{color:T.green}}>실제 데이터</span>로 교체됩니다.
          IMF·FRED·AV·Finnhub는 이미 연결 중.
        </div>
      </div>

      {/* API 연결 상태 요약 */}
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
        {[
          {label:"ECOS", on:live.ecosLive,  col:T.green},
          {label:"IMF",  on:live.imfLive,   col:T.accent},
          {label:"FRED", on:live.fredLive,  col:T.purple},
          {label:"AV",   on:live.avLive,    col:T.gold},
          {label:"FH",   on:live.fhLive,    col:T.orange},
          {label:"FSS",  on:live.fssLive,   col:T.teal},
        ].map(function(s){return(
          <div key={s.label} style={{padding:"4px 10px",borderRadius:3,
            border:"1px solid "+(s.on?s.col:T.dim),
            background:s.on?s.col+"15":"transparent",
            fontFamily:"JetBrains Mono",fontSize:9,color:s.on?s.col:T.dim}}>
            {s.on?"●":"○"} {s.label} {s.on?"LIVE":"미연결"}
          </div>
        );})}
      </div>

      {/* 각 API 카드 */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {apis.map(function(api){return(
          <div key={api.name} style={{background:T.panel,borderRadius:6,
            border:"1px solid "+(api.keyStatus?api.color+"44":T.border),
            overflow:"hidden"}}>
            {/* 헤더 */}
            <div style={{padding:"10px 14px",borderBottom:"1px solid "+T.border,
              background:api.keyStatus?api.color+"0a":"transparent",
              display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <span style={{fontSize:12,color:api.color,fontWeight:700,fontFamily:"Space Grotesk"}}>{api.name}</span>
                <span style={{marginLeft:8,fontSize:8,color:T.muted,fontFamily:"JetBrains Mono"}}>{api.cost}/월</span>
              </div>
              <div style={{display:"flex",gap:5,alignItems:"center"}}>
                <span style={{fontSize:8,padding:"2px 7px",borderRadius:2,fontFamily:"JetBrains Mono",
                  color:api.keyStatus?T.green:T.orange,
                  border:"1px solid "+(api.keyStatus?T.green:T.orange)+"44"}}>
                  {api.keyStatus ? "● LIVE" : "○ 키 필요"}
                </span>
              </div>
            </div>

            <div style={{padding:"10px 14px"}}>
              {/* 실제 수신 데이터 */}
              {api.liveData && api.liveData.length > 0 && (
                <div style={{background:T.green+"0d",border:"1px solid "+T.green+"33",
                  borderRadius:4,padding:"6px 10px",marginBottom:8}}>
                  <div style={{fontSize:7.5,color:T.green,fontFamily:"JetBrains Mono",fontWeight:700,marginBottom:3}}>
                    ✅ 실시간 수신 중
                  </div>
                  {api.liveData.map(function(d,i){return(
                    <div key={i} style={{fontSize:8,color:T.text,fontFamily:"JetBrains Mono"}}>{d}</div>
                  );})}
                </div>
              )}

              {/* 키 미설정시 발급 안내 */}
              {!api.keyStatus && api.inputVar && (
                <div style={{background:T.orange+"0d",border:"1px solid "+T.orange+"33",
                  borderRadius:4,padding:"7px 10px",marginBottom:8}}>
                  <div style={{fontSize:7.5,color:T.orange,fontFamily:"JetBrains Mono",fontWeight:700,marginBottom:3}}>
                    🔑 키 발급 방법
                  </div>
                  <div style={{fontSize:8,color:T.muted,fontFamily:"JetBrains Mono",lineHeight:1.7}}>
                    {api.getKey}
                  </div>
                  <div style={{fontSize:7.5,color:T.dim,fontFamily:"JetBrains Mono",marginTop:4}}>
                    발급 후 코드 상단 <span style={{color:T.accent}}>{api.inputVar}</span> 변수에 입력
                  </div>
                </div>
              )}
              {!api.keyStatus && !api.inputVar && (
                <div style={{background:T.green+"0d",border:"1px solid "+T.green+"33",borderRadius:4,
                  padding:"6px 10px",marginBottom:8,fontSize:8,color:T.green,fontFamily:"JetBrains Mono"}}>
                  ✅ {api.getKey}
                </div>
              )}

              {/* 커버리지 */}
              <div style={{fontSize:8,color:T.muted,fontFamily:"JetBrains Mono",marginBottom:6,lineHeight:1.6}}>
                {api.coverage}
              </div>

              {/* 시리즈 목록 */}
              <div style={{borderTop:"1px solid "+T.border,paddingTop:6}}>
                <div style={{fontSize:7,color:T.dim,fontFamily:"JetBrains Mono",marginBottom:4,letterSpacing:".08em"}}>
                  주요 시리즈
                </div>
                {api.series.map(function(s){return(
                  <div key={s.code} style={{display:"flex",justifyContent:"space-between",
                    padding:"3px 0",borderBottom:"1px solid "+T.border+"44"}}>
                    <div>
                      <span style={{fontSize:8,color:T.text,fontFamily:"JetBrains Mono"}}>{s.name}</span>
                      {s.note && <span style={{fontSize:7,color:T.dim,fontFamily:"JetBrains Mono",marginLeft:6}}>{s.note}</span>}
                    </div>
                    <span style={{fontSize:7.5,color:api.color,fontFamily:"JetBrains Mono",marginLeft:8,whiteSpace:"nowrap"}}>{s.unit}</span>
                  </div>
                );})}
              </div>

              {/* 링크 */}
              <a href={api.url} target="_blank" rel="noopener"
                style={{display:"block",marginTop:8,fontSize:8,color:api.color,
                  fontFamily:"JetBrains Mono",textDecoration:"none"}}>
                ↗ {api.url}
              </a>
            </div>
          </div>
        );})}
      </div>

      {/* ECOS 설명 추가 */}
      <div style={{marginTop:14,padding:"12px 16px",background:T.panel,borderRadius:6,
        border:"1px solid "+T.green+"33"}}>
        <div style={{fontSize:10,color:T.green,fontFamily:"Space Grotesk",fontWeight:700,marginBottom:8}}>
          🎯 ECOS 키 입력 후 자동으로 바뀌는 것들
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
          {[
            ["🌍 자금지도 KR 유입", "가상 $180B → 실제 FDI 유입액"],
            ["🌍 자금지도 KR 유출", "가상 $55B  → 실제 외국인 순매도"],
            ["📊 금리탭 KR 기준금리", "REGIONS 하드코딩 → ECOS 실시간"],
            ["📊 금리탭 KR 경상수지", "가상값 → BOP 실제 월별 데이터"],
            ["📅 타임라인 KR 플로우", "genFlow 시뮬레이션 → 실제 24개월"],
            ["🦁 헤지펀드 KR 지표", "고정값 → ECOS 실시간 거시지표"],
          ].map(function(row,i){return(
            <div key={i} style={{padding:"6px 8px",background:T.panel2,borderRadius:3,
              border:"1px solid "+T.border}}>
              <div style={{fontSize:8,color:T.accent,fontFamily:"JetBrains Mono",fontWeight:700}}>{row[0]}</div>
              <div style={{fontSize:7.5,color:T.muted,fontFamily:"JetBrains Mono",marginTop:2}}>{row[1]}</div>
            </div>
          );})}
        </div>
      </div>
    </div>
  );
}

function App(){
  const [tab,setTab]=useState("worldmap");
  const [clock,setClock]=useState(new Date());
  useEffect(()=>{const iv=setInterval(()=>setClock(new Date()),1000);return()=>clearInterval(iv);},[]);
  const kst=new Date(clock.toLocaleString("en-US",{timeZone:"Asia/Seoul"}));
  const nyc=new Date(clock.toLocaleString("en-US",{timeZone:"America/New_York"}));
  const lon=new Date(clock.toLocaleString("en-US",{timeZone:"Europe/London"}));
  const nyO=nyc.getHours()>=9&&nyc.getHours()<16;
  const lonO=lon.getHours()>=8&&lon.getHours()<16;
  const kstO=kst.getHours()>=9&&kst.getHours()<15;

  const TABS=[
    {id:"worldmap", label:"🌍 글로벌 자금 지도",  sub:"9개 지역·자금흐름"},
    {id:"chain",    label:"🔗 매크로 연결고리",   sub:"중앙은행→시장 전달"},
    {id:"timeline", label:"📅 타임라인·스냅샷",   sub:"24M 시계열·CSV"},
    {id:"hedgefund",label:"🦁 헤지펀드 추적",     sub:"8대 펀드 포지션"},
    {id:"markets",  label:"📊 글로벌 시장",       sub:"지수·FX·크립토·금리"},
    {id:"apiguide", label:"📡 데이터 API 가이드", sub:"비용·가이드"},
  ];

  return(
    <div style={{background:T.bg,height:"100vh",display:"flex",flexDirection:"column",fontFamily:"JetBrains Mono,monospace"}}>

      {/* ── 헤더 ── */}
      <div style={{height:44,background:"#02040a",borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 16px",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:3,height:28,background:`linear-gradient(180deg,${T.accent},${T.purple})`,borderRadius:2}}/>
          <div>
            <span style={{fontFamily:"Space Grotesk",fontSize:17,fontWeight:700,color:T.accent,letterSpacing:".04em"}}>GLOBAL MACRO INTELLIGENCE</span>
            <span style={{fontSize:8.5,color:T.muted,fontFamily:"JetBrains Mono",marginLeft:10}}>v2.0 · FRED+AV+Finnhub Live · 9 Regions · Bloomberg-Style</span>
          </div>
        </div>
        <div style={{display:"flex",gap:16,fontSize:10,alignItems:"center"}}>
          <span className="mono">KST <span style={{color:kstO?T.green:T.accent,fontWeight:700}}>{kst.toLocaleTimeString("ko-KR",{hour12:false})}</span>{kstO&&<span style={{color:T.green,fontSize:7,marginLeft:3}}>OPEN</span>}</span>
          <span className="mono">LON <span style={{color:lonO?T.green:T.gold,fontWeight:700}}>{lon.toLocaleTimeString("en-GB",{hour12:false})}</span></span>
          <span className="mono">NYC <span style={{color:nyO?T.green:T.gold,fontWeight:700}}>{nyc.toLocaleTimeString("en-US",{hour12:false})}</span></span>
          <span style={{color:nyO?T.green:T.red,fontSize:8,padding:"2px 9px",border:`1px solid ${(nyO?T.green:T.red)}55`,borderRadius:2,fontWeight:700,fontFamily:"JetBrains Mono"}}>● NYSE {nyO?"OPEN":"CLOSED"}</span>
        </div>
      </div>

      {/* ── 티커 ── */}
      <div style={{height:40,flexShrink:0,borderBottom:`1px solid ${T.border}`}}>
        <TV type="ticker-tape" height={40} opts={{symbols:[
          {proName:"FOREXCOM:SPXUSD",title:"S&P500"},{proName:"INDEX:NKY",title:"NIKKEI"},{proName:"KRX:KOSPI",title:"KOSPI"},
          {proName:"INDEX:DEU40",title:"DAX"},{proName:"INDEX:HSI",title:"항셍"},{proName:"SSE:000001",title:"상하이"},
          {proName:"BITSTAMP:BTCUSD",title:"BTC"},{proName:"BITSTAMP:ETHUSD",title:"ETH"},
          {proName:"FOREXCOM:USDKRW",title:"USD/KRW"},{proName:"FOREXCOM:USDJPY",title:"USD/JPY"},
          {proName:"COMEX:GC1!",title:"금"},{proName:"NYMEX:CL1!",title:"WTI"},
          {proName:"COMEX:HG1!",title:"구리"},{proName:"INDEX:TASI",title:"TADAWUL"},
          {proName:"BMFBOVESPA:IBOV",title:"BOVESPA"},{proName:"ASX:XJO",title:"ASX200"},
        ],showSymbolLogo:false,displayMode:"adaptive"}}/>
      </div>

      {/* ── 탭 네비 ── */}
      <div style={{height:46,background:"#060c18",borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"stretch",padding:"0 10px",flexShrink:0}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{padding:"0 14px",border:"none",background:"transparent",cursor:"pointer",
              borderBottom:tab===t.id?`2px solid ${T.accent}`:"2px solid transparent",
              color:tab===t.id?T.accent:T.muted,fontFamily:"JetBrains Mono",fontSize:10,
              fontWeight:tab===t.id?700:400,display:"flex",flexDirection:"column",
              alignItems:"center",justifyContent:"center",gap:1,transition:"color .2s",flexShrink:0}}>
            <span style={{fontSize:tab===t.id?10.5:10}}>{t.label}</span>
            <span style={{fontSize:7,opacity:.7,color:tab===t.id?T.accent:T.dim}}>{t.sub}</span>
          </button>
        ))}
      </div>

      {/* ── 메인 컨텐츠 ── */}
      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
        {tab==="worldmap"&&<WorldMapView/>}
        {tab==="chain"&&<MacroChainView/>}
        {tab==="timeline"&&<TimelineView/>}
        {tab==="hedgefund"&&<HedgeFundView/>}
        {tab==="markets"&&<MarketsView/>}
        {tab==="apiguide"&&<ApiGuideView/>}
      </div>

      {/* ── 푸터 ── */}
      <div style={{height:22,background:"#02040a",borderTop:`1px solid ${T.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 14px",flexShrink:0}}>
        <span style={{fontSize:7.5,color:T.dim,fontFamily:"JetBrains Mono"}}>TradingView · CoinGecko · ExchangeRate-API (실시간) · 자금흐름·헤지펀드: 모델/추정 데이터 · 투자 참고용</span>
        <span style={{fontSize:7.5,color:T.muted,fontFamily:"JetBrains Mono"}}>GLOBAL MACRO INTELLIGENCE v1.0 · Made for 최윤준 · {new Date().getFullYear()}</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
