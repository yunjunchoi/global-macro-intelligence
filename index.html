<script type="text/javascript">
/* ════════════════════════════════════════════════════════════
   LIVE DATA — plain JS (Babel 불필요)
   window.__live 에 저장 후 React가 읽음

   데이터 소스:
   ① FRED          — 미국 거시지표·금리 (무료, 키 보유)
   ② Alpha Vantage — 원자재 가격 (무료 25콜/일)
   ③ Finnhub       — 글로벌 뉴스·경제캘린더 (무료)
   ④ IMF API       — 글로벌 BOP·GDP·FDI (키 불필요 ✅)
   ⑤ 한국은행 ECOS  — 한국 국제수지·FDI·금리 (키 입력 필요)
   ⑥ 금융감독원 FSS — 외국인 증권투자 (키 입력 필요)
════════════════════════════════════════════════════════════ */
window.__live = {
  loading: true,
  fredLive: false, avLive: false, fhLive: false,
  imfLive: false, ecosLive: false, fssLive: false,
  fred: {}, av: {wti:null,brent:null,natgas:null,copper:null},
  fh: {news:[], econ:[]},
  imf: { gdp:{}, bop:{}, fdi:{}, cpi:{} },
  ecos: { bopMonthly:[], fdiInflow:[], fdiOutflow:[], baseRate:null, fxReserves:null },
  fss:  { foreignStock:[], foreignBond:[] },
  realFlows: null,
  lastUpdated: null,
};

/* ── API 키 설정 ───────────────────────── */
var FRED_KEY = 'b265c038167e9fa6fc34678a62c9c2a4';
var AV_KEY   = 'E4707A6I8NXZOF6K';
var FH_KEY   = 'd6hg6m9r01qr5k4breqgd6hg6m9r01qr5k4brer0';
var ECOS_KEY = 'ZV9F4SG308AAQ8GMQR35';  // 한국은행 ECOS API
var FSS_KEY  = '';  // ← 금융감독원 키 (data.fss.or.kr 발급)

function fredFetch(series) {
  return fetch('https://api.stlouisfed.org/fred/series/observations?series_id=' + series +
    '&api_key=' + FRED_KEY + '&limit=5&sort_order=desc&file_type=json')
    .then(function(r){ return r.json(); })
    .then(function(d){
      var obs = (d.observations || []).filter(function(o){ return o.value !== '.' && o.value !== ''; });
      return obs.length ? parseFloat(obs[0].value) : null;
    }).catch(function(){ return null; });
}

function fredCpiYoy() {
  return fetch('https://api.stlouisfed.org/fred/series/observations?series_id=CPIAUCSL' +
    '&api_key=' + FRED_KEY + '&limit=15&sort_order=desc&file_type=json')
    .then(function(r){ return r.json(); })
    .then(function(d){
      var obs = (d.observations || []).filter(function(o){ return o.value !== '.' && o.value !== ''; });
      if (obs.length < 13) return null;
      return +((parseFloat(obs[0].value) / parseFloat(obs[12].value) - 1) * 100).toFixed(2);
    }).catch(function(){ return null; });
}

function avFetch(func) {
  return fetch('https://www.alphavantage.co/query?function=' + func + '&interval=monthly&apikey=' + AV_KEY)
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d['Note'] || d['Information']) return null;
      var latest = d.data && d.data[0];
      return latest ? +parseFloat(latest.value).toFixed(3) : null;
    }).catch(function(){ return null; });
}

function fhNewsFetch() {
  return fetch('https://finnhub.io/api/v1/news?category=general&token=' + FH_KEY)
    .then(function(r){ return r.json(); })
    .then(function(d){
      return Array.isArray(d) ? d.filter(function(n){ return n.headline && n.url; }).slice(0, 20) : [];
    }).catch(function(){ return []; });
}

function fhEconFetch() {
  var from = new Date(); from.setDate(from.getDate() - 7);
  var to   = new Date(); to.setDate(to.getDate() + 14);
  var fmt  = function(d){ return d.toISOString().slice(0, 10); };
  return fetch('https://finnhub.io/api/v1/calendar/economic?from=' + fmt(from) + '&to=' + fmt(to) + '&token=' + FH_KEY)
    .then(function(r){ return r.json(); })
    .then(function(d){
      return (d.economicCalendar || []).filter(function(e){ return e.impact === 'High' || e.impact === 'Medium'; }).slice(0, 25);
    }).catch(function(){ return []; });
}

// FRED 병렬 호출
Promise.all([
  fredFetch('DFF'), fredFetch('UNRATE'), fredCpiYoy(), fredFetch('A191RL1Q225SBEA'),
  fredFetch('DGS2'), fredFetch('DGS5'), fredFetch('DGS10'), fredFetch('DGS30'),
  fredFetch('DGS1MO'), fredFetch('DGS3MO'), fredFetch('DGS6MO'), fredFetch('DGS1')
]).then(function(v) {
  var fredData = {
    fedRate: v[0], unemployment: v[1], cpi: v[2], gdpGrowth: v[3],
    rate2y: v[4], rate5y: v[5], rate10y: v[6], rate30y: v[7],
    yields: [v[8],v[9],v[10],v[11],v[4],v[5],v[6],v[7]].map(function(x){ return x || 0; })
  };
  window.__live.fred = fredData;
  window.__live.fredLive = !!(v[0] || v[6]);
  window.__live.lastUpdated = new Date();
  window.__live.loading = false;
  console.log('[FRED] loaded', fredData.fedRate, fredData.rate10y);
}).catch(function(e){ console.warn('FRED error', e); window.__live.loading = false; });

// Alpha Vantage
Promise.all([avFetch('WTI'), avFetch('NATURAL_GAS'), avFetch('COPPER'), avFetch('BRENT')])
  .then(function(v) {
    window.__live.av = { wti: v[0], natgas: v[1], copper: v[2], brent: v[3] };
    window.__live.avLive = !!(v[0] || v[1]);
    console.log('[AV] loaded wti=' + v[0]);
  }).catch(function(e){ console.warn('AV error', e); });

// Finnhub
Promise.all([fhNewsFetch(), fhEconFetch()])
  .then(function(v) {
    window.__live.fh = { news: v[0], econ: v[1] };
    window.__live.fhLive = v[0].length > 0;
    console.log('[FH] news=' + v[0].length + ' econ=' + v[1].length);
  }).catch(function(e){ console.warn('FH error', e); });

/* ══════════════════════════════════════════════════════════
   ④ IMF DataMapper API (키 불필요)
   - 국가 코드: KOR, USA, CHN, JPN, DEU, GBR, BRA, AUS, SAU
   - 지표: NGDP_RPCH(GDP성장), BCA_NGDPD(경상수지/GDP), PCPIPCH(CPI)
══════════════════════════════════════════════════════════ */
var IMF_COUNTRIES = ['KOR','USA','CHN','JPN','DEU','GBR','BRA','AUS','SAU','IND'];
var IMF_REGION_MAP = {
  KOR:'kr', USA:'us', CHN:'cn', JPN:'jp', DEU:'eu', GBR:'eu',
  BRA:'latam', AUS:'oceania', SAU:'me', IND:'cn'
};

function imfFetch(indicator, countries) {
  var url = 'https://www.imf.org/external/datamapper/api/v1/' + indicator
    + '/' + countries.join(',') + '?periods=2022,2023,2024';
  return fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var result = {};
      var values = d.values && d.values[indicator];
      if (!values) return result;
      Object.keys(values).forEach(function(cty) {
        var yrs = values[cty];
        // 가장 최신 연도 값
        var val = yrs['2024'] != null ? yrs['2024']
                : yrs['2023'] != null ? yrs['2023']
                : yrs['2022'];
        if (val != null) result[cty] = +parseFloat(val).toFixed(2);
      });
      return result;
    }).catch(function(e) { console.warn('IMF ' + indicator + ' error', e); return {}; });
}

Promise.all([
  imfFetch('NGDP_RPCH',  IMF_COUNTRIES),   // GDP 성장률 %
  imfFetch('BCA_NGDPD',  IMF_COUNTRIES),   // 경상수지/GDP %
  imfFetch('PCPIPCH',    IMF_COUNTRIES),   // CPI 인플레이션 %
]).then(function(v) {
  window.__live.imf.gdp = v[0];
  window.__live.imf.bop = v[1];
  window.__live.imf.cpi = v[2];
  window.__live.imfLive = Object.keys(v[0]).length > 0;
  window.__live.lastUpdated = new Date();
  console.log('[IMF] GDP loaded:', v[0]);
  console.log('[IMF] BOP loaded:', v[1]);
}).catch(function(e) { console.warn('IMF error', e); });

/* ══════════════════════════════════════════════════════════
   ⑤ 한국은행 ECOS API (키 입력 후 활성화)
   ECOS_KEY 를 위에 입력하면 자동 실행됩니다
══════════════════════════════════════════════════════════ */
function ecosFetch(statCode, cycle, startDate, endDate, itemCode1) {
  if (!ECOS_KEY) return Promise.resolve(null);
  // ECOS API: json/kr 엔드포인트 (CORS 공식 지원)
  var url = 'https://ecos.bok.or.kr/api/StatisticSearch/' + ECOS_KEY
    + '/json/kr/1/100/'   // 최대 100건
    + statCode + '/' + cycle + '/' + startDate + '/' + endDate
    + (itemCode1 ? '/' + itemCode1 : '');
  return fetch(url, { method: 'GET', headers: { 'Accept': 'application/json' } })
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(d) {
      if (d.RESULT) {
        // ECOS 에러 응답 (예: CODE: INFO-200 데이터없음)
        console.warn('[ECOS] API 응답:', d.RESULT.CODE, d.RESULT.MESSAGE);
        return null;
      }
      if (!d.StatisticSearch) return null;
      return d.StatisticSearch.row || [];
    }).catch(function(e) {
      console.warn('[ECOS] ' + statCode + ' fetch 실패:', e.message);
      return null;
    });
}

function loadEcos() {
  if (!ECOS_KEY) {
    console.log('[ECOS] 키 미설정 — ecos.bok.or.kr에서 발급 후 ECOS_KEY에 입력');
    return;
  }

  var now = new Date();
  var endYM = now.getFullYear() + ('0'+(now.getMonth()+1)).slice(-2); // YYYYMM
  var startYM = (now.getFullYear()-2) + '01';

  Promise.all([
    // 국제수지 경상수지 (060Y002, M, 항목코드 '00')
    ecosFetch('060Y002', 'M', startYM, endYM, '00'),
    // 외국인직접투자 유입 신고기준 (062Y003)
    ecosFetch('062Y003', 'Q', (now.getFullYear()-2)+'Q1',
      now.getFullYear()+'Q'+(Math.ceil((now.getMonth()+1)/3))),
    // 한국은행 기준금리 (722Y001)
    ecosFetch('722Y001', 'M', startYM, endYM, '0101000'),
    // 외환보유액 (합계) (301Y013)
    ecosFetch('301Y013', 'M', startYM, endYM, '010000000'),
  ]).then(function(v) {
    var bop = v[0], fdi = v[1], rate = v[2], fx = v[3];

    // 국제수지 파싱 (억달러 단위)
    if (bop) {
      window.__live.ecos.bopMonthly = bop.map(function(r) {
        return { date: r.TIME, value: parseFloat(r.DATA_VALUE) };
      }).filter(function(r) { return !isNaN(r.value); });
    }

    // FDI 유입 파싱
    if (fdi) {
      window.__live.ecos.fdiInflow = fdi.map(function(r) {
        return { date: r.TIME, value: parseFloat(r.DATA_VALUE) };
      }).filter(function(r) { return !isNaN(r.value); });
    }

    // 기준금리 (가장 최신)
    if (rate && rate.length > 0) {
      var latest = rate[rate.length - 1];
      window.__live.ecos.baseRate = parseFloat(latest.DATA_VALUE);
    }

    // 외환보유액 (억달러)
    if (fx && fx.length > 0) {
      window.__live.ecos.fxReserves = parseFloat(fx[fx.length-1].DATA_VALUE);
    }

    window.__live.ecosLive = true;
    window.__live.lastUpdated = new Date();
    console.log('[ECOS] 기준금리:', window.__live.ecos.baseRate);
    console.log('[ECOS] 경상수지 최신:', window.__live.ecos.bopMonthly.slice(-1));

    // 실제 FDI 데이터로 플로우 재계산
    rebuildRealFlows();
  }).catch(function(e) { console.warn('ECOS load error', e); });
}

/* ══════════════════════════════════════════════════════════
   ⑥ 금융감독원 FSS API (키 입력 후 활성화)
   data.fss.or.kr → 공공데이터포털 신청
══════════════════════════════════════════════════════════ */
function loadFss() {
  if (!FSS_KEY) {
    console.log('[FSS] 키 미설정 — data.fss.or.kr에서 발급');
    return;
  }
  // 외국인 주식 보유 현황
  var url = 'https://apis.data.go.kr/1160100/service/GetStockSecuritiesInfoService/getStockPriceInfo'
    + '?serviceKey=' + FSS_KEY + '&numOfRows=12&pageNo=1&resultType=json';
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      window.__live.fssLive = true;
      console.log('[FSS] loaded');
    }).catch(function(e) { console.warn('FSS error', e); });
}

/* ══════════════════════════════════════════════════════════
   실제 데이터 기반 플로우 재계산
   ECOS 로드 완료 후 호출됨
══════════════════════════════════════════════════════════ */
function rebuildRealFlows() {
  var ecos = window.__live.ecos;
  var imf  = window.__live.imf;

  // 경상수지 최근 12개월 (억달러 → 단위 환산)
  var bop12 = ecos.bopMonthly.slice(-12);
  var avgBop = bop12.length > 0
    ? bop12.reduce(function(s,r){ return s + r.value; }, 0) / bop12.length
    : null;

  // FDI 유입 최근값 (억달러)
  var fdiLatest = ecos.fdiInflow.length > 0
    ? ecos.fdiInflow[ecos.fdiInflow.length-1].value
    : null;

  // 실제값 기반 플로우 오버라이드
  window.__live.realFlows = {
    // us→kr: 실제 FDI 유입 (분기→월 환산, 억달러→B$)
    usToKr: fdiLatest ? +(fdiLatest / 10).toFixed(1) : null,
    // kr 경상수지 (억달러)
    krCurrentAccount: avgBop ? +avgBop.toFixed(1) : null,
    // 기준금리
    krBaseRate: ecos.baseRate,
    // IMF 기반 각국 GDP 성장률
    gdpGrowth: imf.gdp,
    // IMF 기반 경상수지/GDP
    bopRatio: imf.bop,
    source: 'ECOS+IMF',
    updatedAt: new Date().toISOString(),
  };

  console.log('[realFlows] 실제 데이터 기반 플로우 생성:', window.__live.realFlows);
}

// ECOS·FSS 로드 시작
loadEcos();
loadFss();

</script>

function buildMonths(n=24){
  const now=new Date(),arr=[];
  for(let i=n-1;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    arr.push({label:`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}`,mo:d.getMonth(),yr:d.getFullYear()});
  }
  return arr;
}
const MONTHS=buildMonths(24);

function sr(seed){let s=seed%2147483647;if(s<=0)s+=2147483646;return()=>{s=s*16807%2147483647;return(s-1)/2147483646;};}
function genFlow(base,phase,trend,n=24){
  const r=sr(Math.round(base*100+phase*10));
  return Array.from({length:n},(_,i)=>Math.round(Math.max(5,base+Math.sin((i/12)*2*Math.PI+phase)*base*.22+(i/n)*trend+(r()-.5)*base*.1)));
}

function TV({type,opts,height}){
  const ref=useRef(null);const uid=useRef("tv_"+Math.random().toString(36).slice(2));
  useEffect(()=>{
    if(!ref.current)return;ref.current.innerHTML="";
    const w=document.createElement("div");w.id=uid.current;ref.current.appendChild(w);
    const s=document.createElement("script");s.src=`https://s3.tradingview.com/external-embedding/embed-widget-${type}.js`;s.async=true;
    s.innerHTML=JSON.stringify({...opts,container_id:uid.current,width:"100%",height,colorTheme:"dark",locale:"kr",isTransparent:true});
    w.appendChild(s);return()=>{if(ref.current)ref.current.innerHTML="";};
  },[]);
  return <div ref={ref} style={{width:"100%",height,overflow:"hidden"}}/>;
}

function Spark({data,width=80,height=26}){
  if(!data||data.length<2)return null;
  const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*width},${height-((v-mn)/rng)*(height-4)-2}`).join(" ");
  const up=data[data.length-1]>=data[0];const lc=up?T.green:T.red;
  return(
    <svg width={width} height={height} style={{display:"block",flexShrink:0}}>
      <polyline points={pts} fill="none" stroke={lc} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
      <circle cx={(data.length-1)/(data.length-1)*width} cy={height-((data[data.length-1]-mn)/rng)*(height-4)-2} r="2.5" fill={lc}/>
    </svg>
  );
}

function ScoreRing({score,size=48,label}){
  const col=score>65?T.green:score>45?T.gold:T.red;
  const r=size/2-5,circ=2*Math.PI*r,dash=(score/100)*circ;
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
      <svg width={size} height={size}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={T.dim} strokeWidth="3.5"/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={col} strokeWidth="3.5"
          strokeDasharray={`${dash} ${circ}`} strokeDashoffset={circ/4} strokeLinecap="round"/>
        <text x={size/2} y={size/2+4} textAnchor="middle" fill={col} fontSize={size>44?"11":"9"} fontWeight="700" fontFamily="JetBrains Mono">{score}</text>
      </svg>
      {label&&<span style={{fontSize:7,color:T.muted,fontFamily:"JetBrains Mono",textAlign:"center"}}>{label}</span>}
    </div>
  );
}

function Panel({title,accent,badge,children,style}){
  const ac=accent||T.accent;
  return(
    <div style={{background:T.panel,border:`1px solid ${T.border}`,borderRadius:6,overflow:"hidden",...style}}>
      <div style={{padding:"7px 14px",borderBottom:`1px solid ${T.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",background:T.panel2}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:2.5,height:16,background:ac,borderRadius:2,flexShrink:0}}/>
          <span style={{fontFamily:"Space Grotesk",fontSize:11,fontWeight:700,color:ac,letterSpacing:".08em",textTransform:"uppercase"}}>{title}</span>
        </div>
        {badge}
      </div>
      {children}
    </div>
  );
}

function Badge({children,color}){
  const c=color||T.muted;
  return <span style={{fontSize:8,color:c,background:c+"20",padding:"2px 8px",borderRadius:2,fontFamily:"JetBrains Mono",fontWeight:700,border:`1px solid ${c}44`}}>{children}</span>;
}

/* ════════════════════════════════════════════════════════════════
   TAB 1: WORLD MAP — 9개 지역 + 자금흐름

/* ════════════════════════════════════════════════════════════════
   TAB 1: WORLD MAP v2 — 자금 흐름 라인 강화 + 인사이트 패널
════════════════════════════════════════════════════════════════ */
function WorldMapView(){
  const [moIdx,setMoIdx]=useState(MONTHS.length-1);
  const [playing,setPlaying]=useState(false);
  const [speed,setSpeed]=useState(1.0);
  const [selRegion,setSelRegion]=useState(null);
  const [hover,setHover]=useState(null);
  const [viewMode,setViewMode]=useState("map"); // "map" | "flowlines" | "sankey"
  const [tick,setTick]=useState(0);
  const playRef=useRef(null);
  // ECOS/IMF 실제 데이터 폴링
  const [ecosLive,setEcosLive]=useState(!!(window.__live&&window.__live.ecosLive));
  const [imfGdp,setImfGdp]=useState((window.__live&&window.__live.imf&&window.__live.imf.gdp)||{});
  const [krBaseRate,setKrBaseRate]=useState(null);
  const [krBop,setKrBop]=useState([]);
  useEffect(function(){
    var iv=setInterval(function(){
      var lv=window.__live; if(!lv) return;
      if(lv.ecosLive){
        setEcosLive(true);
        if(lv.ecos.baseRate!=null) setKrBaseRate(lv.ecos.baseRate);
        if(lv.ecos.bopMonthly&&lv.ecos.bopMonthly.length>0) setKrBop(lv.ecos.bopMonthly);
      }
      if(lv.imfLive&&lv.imf.gdp) setImfGdp(Object.assign({},lv.imf.gdp));
    },1500);
    return function(){clearInterval(iv);};
  },[]);

  useEffect(()=>{if(playing){playRef.current=setInterval(()=>setMoIdx(m=>(m+1)%MONTHS.length),Math.round(1000/speed));}return()=>clearInterval(playRef.current);},[playing,speed]);
  useEffect(()=>{const iv=setInterval(()=>setTick(t=>t+1),55);return()=>clearInterval(iv);},[]);

  const flows=useMemo(()=>FLOWS.map(f=>({...f,amt:f.amounts[moIdx]})),[moIdx]);
  const maxAmt=useMemo(()=>Math.max(...flows.map(f=>f.amt)),[flows]);
  const curMo=MONTHS[moIdx];
  const totalFlow=flows.reduce((s,f)=>s+f.amt,0);

  // ECOS/IMF 실제값으로 REGIONS 오버라이드 (KR 기준금리, GDP 성장률)
  const regionsLive=useMemo(function(){
    var IMF_MAP={us:"USA",cn:"CHN",jp:"JPN",eu:"DEU",kr:"KOR"};
    return REGIONS.map(function(r){
      var overrides={};
      // 한국: ECOS 실제 기준금리
      if(r.id==="kr"&&krBaseRate!=null) overrides.policyRate=krBaseRate;
      // IMF GDP 성장률
      var cty=IMF_MAP[r.id];
      if(cty&&imfGdp[cty]!=null) overrides.gdpGrowth=imfGdp[cty];
      return Object.keys(overrides).length>0 ? Object.assign({},r,overrides) : r;
    });
  },[krBaseRate,imfGdp]);

  // Particle system
  const particles=useRef([]);
  useEffect(()=>{
    particles.current=flows.flatMap((f,fi)=>{
      const cnt=f.tier==="xl"?12:f.tier==="lg"?8:f.tier==="md"?5:3;
      const normW=f.amt/maxAmt;
      return Array.from({length:Math.round(cnt*(0.4+normW*.8))},(_,i)=>({
        id:`${fi}-${i}-${moIdx}`,from:f.from,to:f.to,color:f.color,
        speed:(.035+Math.random()*.07)*speed*(0.5+normW*.7),
        maxR:(f.tier==="xl"?7:f.tier==="lg"?5:f.tier==="md"?3.5:2.2)*(0.5+normW*.6),
        startProg:Math.random(),opacity:.5+normW*.45,
      }));
    });
  },[moIdx,speed]);

  function nodePos(rid){const r=REGIONS.find(x=>x.id===rid);return r?{x:r.mapX,y:r.mapY}:{x:.5,y:.5};}

  function FloatParticle({p}){
    const prog=useRef(p.startProg);const[pos,setPos]=useState(p.startProg);
    useEffect(()=>{let raf,last=performance.now();const t=now=>{prog.current=(prog.current+(now-last)/1000*p.speed)%1;last=now;setPos(prog.current);raf=requestAnimationFrame(t);};raf=requestAnimationFrame(t);return()=>cancelAnimationFrame(raf);},[p.speed]);
    const f=nodePos(p.from),t2=nodePos(p.to);
    const cx=f.x+(t2.x-f.x)*pos,cy=f.y+(t2.y-f.y)*pos;
    const r=p.maxR*(0.3+(1-Math.abs(pos-.5)*2)*.7);
    return <circle cx={`${cx*100}%`} cy={`${cy*100}%`} r={r} fill={p.color} opacity={p.opacity*(0.3+pos*.7)}/>;
  }

  // FLOW LINES VIEW — 대형 라인 + 레이블
  function FlowLinesView(){
    const sorted=[...flows].sort((a,b)=>b.amt-a.amt);
    const max=(sorted[0]&&sorted[0].amt)||1;
    const W=900,H=480;
    const tierColor={xl:"#00d4ff",lg:"#f0b429",md:"#00e676",sm:"#bb86fc"};

    return(
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <svg width="100%" height="100%" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYMid meet" style={{display:"block"}}>
          <defs>
            <radialGradient id="flBg" cx="50%" cy="50%" r="70%"><stop offset="0%" stopColor="#060c18"/><stop offset="100%" stopColor="#04060d"/></radialGradient>
            <filter id="flGlow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          </defs>
          <rect width={W} height={H} fill="url(#flBg)"/>

          {/* 격자 */}
          {Array.from({length:9},(_,i)=><line key={i} x1={(i+1)*90} y1="0" x2={(i+1)*90} y2={H} stroke="#0a1428" strokeWidth=".5"/>)}
          {Array.from({length:5},(_,i)=><line key={i} x1="0" y1={(i+1)*80} x2={W} y2={(i+1)*80} stroke="#0a1428" strokeWidth=".5"/>)}

          {/* 중앙 세로선: 기준 구분 */}
          <line x1={W/2} y1="20" x2={W/2} y2={H-20} stroke="#1c3050" strokeWidth="1" strokeDasharray="6 4"/>
          <text x={W/2} y="16" textAnchor="middle" fill="#1c3050" fontSize="9" fontFamily="JetBrains Mono">자금 흐름 기준선</text>

          {/* 각 흐름 수평 바 형식 — 왼쪽=출발지, 오른쪽=도착지 */}
          {sorted.map((f,i)=>{
            const fr=REGIONS.find(r=>r.id===f.from),tr=REGIONS.find(r=>r.id===f.to);
            if(!fr||!tr)return null;
            const y=30+i*(H-60)/Math.min(sorted.length,14);
            const barW=(f.amt/max)*(W*.36);
            const cx=W/2;
            const col=f.color;
            const isH=hover===`${f.from}-${f.to}`;
            const lw=isH?Math.max((f.amt/max)*22,8):Math.max((f.amt/max)*16,4);
            const prev=moIdx>0?f.amounts[moIdx-1]:f.amounts[0];const delta=f.amt-prev;
            if(i>=14)return null;
            return(
              <g key={`${f.from}-${f.to}`}
                onMouseEnter={()=>setHover(`${f.from}-${f.to}`)}
                onMouseLeave={()=>setHover(null)}>
                {/* 글로우 */}
                {isH&&<line x1={cx-barW} y1={y+lw/2} x2={cx} y2={y+lw/2} stroke={col} strokeWidth={lw*2.5} strokeOpacity=".08" filter="url(#flGlow)" strokeLinecap="round"/>}
                {/* 메인 라인 */}
                <line x1={cx-barW} y1={y+lw/2} x2={cx} y2={y+lw/2}
                  stroke={col} strokeWidth={lw} strokeOpacity={isH?0.95:.55+(f.amt/max)*.35} strokeLinecap="round"/>
                {/* 화살표 끝 */}
                <polygon points={`${cx+2},${y+lw/2} ${cx-12},${y} ${cx-12},${y+lw}`} fill={col} opacity={isH?1:.7}/>
                {/* 출발 레이블 */}
                <text x={cx-barW-6} y={y+lw/2+4} textAnchor="end" fill={fr.color} fontSize={isH?10:9} fontWeight="700" fontFamily="JetBrains Mono">{fr.flag} {fr.name}</text>
                {/* 도착 레이블 */}
                <text x={cx+18} y={y+lw/2+4} textAnchor="start" fill={tr.color} fontSize={isH?10:9} fontWeight="700" fontFamily="JetBrains Mono">{tr.flag} {tr.name}</text>
                {/* 금액 */}
                <text x={cx-barW/2} y={y+lw/2-(lw/2+4)} textAnchor="middle" fill={col} fontSize={isH?11:9} fontWeight="700" fontFamily="JetBrains Mono">${f.amt}B</text>
                {/* 변화량 */}
                <text x={cx-barW/2} y={y+lw/2+(lw/2+12)} textAnchor="middle" fill={delta>=0?T.green:T.red} fontSize="8" fontFamily="JetBrains Mono">{delta>=0?"▲":"▼"}${Math.abs(delta)}B</text>
                {/* 레이블 */}
                {isH&&<text x={cx-barW/2} y={y+lw/2+4} textAnchor="middle" fill="#fff" fontSize="8" fontFamily="JetBrains Mono" opacity=".8">{f.label}</text>}
                {/* 티어 배지 */}
                <rect x={cx-barW-62} y={y} width={22} height={12} rx="2" fill={tierColor[f.tier]+"30"} stroke={tierColor[f.tier]+"66"}/>
                <text x={cx-barW-51} y={y+9} textAnchor="middle" fill={tierColor[f.tier]} fontSize="7.5" fontWeight="700" fontFamily="JetBrains Mono">{f.tier.toUpperCase()}</text>
              </g>
            );
          })}

          {/* 범례 */}
          <rect x={W-120} y="10" width="110" height="60" rx="3" fill="#04060d" opacity=".9"/>
          <text x={W-65} y="25" textAnchor="middle" fill={T.muted} fontSize="8.5" fontFamily="JetBrains Mono" fontWeight="700">TIER 범례</text>
          {[["XL",">$200B","#00d4ff"],["LG","$100~200B","#f0b429"],["MD","$50~100B","#00e676"],["SM","<$50B","#bb86fc"]].map(([t,rng,c],i)=>(
            <g key={t} transform={`translate(${W-118},${32+i*9})`}>
              <rect x="0" y="0" width="18" height="7" rx="1.5" fill={c} opacity=".6"/>
              <text x="22" y="7" fill={c} fontSize="7.5" fontFamily="JetBrains Mono">{t}: {rng}</text>
            </g>
          ))}
        </svg>
      </div>
    );
  }

  // SANKEY (지역별 순유출입 비교)
  function SankeyView(){
    const regionStats=REGIONS.map(r=>({
      ...r,
      inflow:flows.filter(f=>f.to===r.id).reduce((s,f)=>s+f.amt,0),
      outflow:flows.filter(f=>f.from===r.id).reduce((s,f)=>s+f.amt,0),
    })).map(r=>({...r,net:r.inflow-r.outflow}));
    const maxVal=Math.max(...regionStats.map(r=>Math.max(r.inflow,r.outflow)));

    return(
      <div style={{flex:1,overflowY:"auto",padding:"12px 16px"}}>
        <div style={{fontSize:9,color:T.muted,fontFamily:"JetBrains Mono",fontWeight:700,marginBottom:10,letterSpacing:".1em"}}>
          지역별 자금 유출입 비교 · {curMo.label}
        </div>
        {regionStats.map(r=>{
          const inW=(r.inflow/maxVal)*100,outW=(r.outflow/maxVal)*100;
          const net=r.net;
          return(
            <div key={r.id} style={{marginBottom:10,padding:"10px 12px",background:T.panel,borderRadius:5,border:`1px solid ${r.color}33`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:18}}>{r.flag}</span>
                  <span style={{fontSize:12,color:r.color,fontWeight:700,fontFamily:"Space Grotesk"}}>{r.name}</span>
                </div>
                <span style={{fontSize:13,fontWeight:700,color:net>0?T.green:T.red,fontFamily:"JetBrains Mono"}}>
                  {net>0?"+":""}${Math.round(net)}B 순{net>0?"유입":"유출"}
                </span>
              </div>
              <div style={{marginBottom:4}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                  <span style={{fontSize:8,color:T.green,fontFamily:"JetBrains Mono"}}>유입 ${r.inflow}B</span>
                  <span style={{fontSize:8,color:T.red,fontFamily:"JetBrains Mono"}}>유출 ${r.outflow}B</span>
                </div>
                <div style={{position:"relative",height:14,background:T.dim,borderRadius:7,overflow:"hidden"}}>
                  <div style={{position:"absolute",left:0,top:0,width:`${inW}%`,height:"100%",background:`linear-gradient(90deg,${T.green}99,${T.green})`,borderRadius:"7px 0 0 7px",display:"flex",alignItems:"center",justifyContent:"flex-end",paddingRight:4}}>
                    {inW>15&&<span style={{fontSize:7,color:"#fff",fontWeight:700,fontFamily:"JetBrains Mono"}}>${r.inflow}B</span>}
                  </div>
                  <div style={{position:"absolute",left:`${inW}%`,top:0,width:`${outW*(100-inW)/100}%`,height:"100%",background:`linear-gradient(90deg,${T.red}99,${T.red})`,display:"flex",alignItems:"center",justifyContent:"flex-end",paddingRight:4}}>
                    {outW>20&&<span style={{fontSize:7,color:"#fff",fontWeight:700,fontFamily:"JetBrains Mono"}}>${r.outflow}B</span>}
                  </div>
                </div>
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:4}}>
                {flows.filter(f=>f.to===r.id).slice(0,3).map((f,i)=>{
                  const fr2=REGIONS.find(x=>x.id===f.from);
                  return<span key={i} style={{fontSize:7,color:T.green,background:T.green+"12",padding:"1px 6px",borderRadius:2,fontFamily:"JetBrains Mono"}}>← {fr2&&fr2.name} ${f.amt}B</span>;
                })}
                {flows.filter(f=>f.from===r.id).slice(0,3).map((f,i)=>{
                  const tr2=REGIONS.find(x=>x.id===f.to);
                  return<span key={i} style={{fontSize:7,color:T.red,background:T.red+"12",padding:"1px 6px",borderRadius:2,fontFamily:"JetBrains Mono"}}>→ {tr2&&tr2.name} ${f.amt}B</span>;
                })}
              </div>
            </div>
          );
        })}
      </div>
    );
  }

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      {/* 컨트롤 바 */}
      <div style={{padding:"7px 14px",background:T.panel2,borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
        {/* 뷰 모드 */}
        <div style={{display:"flex",gap:3,flexShrink:0}}>
          <button className={`btn${viewMode==="map"?" a":""}`} onClick={()=>setViewMode("map")}>🗺 세계지도</button>
          <button className={`btn${viewMode==="flowlines"?" ga":""}`} onClick={()=>setViewMode("flowlines")}>📏 자금흐름 라인</button>
          <button className={`btn${viewMode==="sankey"?" pa":""}`} onClick={()=>setViewMode("sankey")}>⚖ 유출입 비교</button>
        </div>
        <div style={{width:1,height:20,background:T.border,flexShrink:0}}/>
        {/* 재생 */}
        {viewMode!=="sankey"&&<>
          <button onClick={()=>setPlaying(p=>!p)} style={{width:28,height:28,borderRadius:"50%",border:`1px solid ${playing?T.accent:T.border}`,background:playing?T.accent+"20":"transparent",color:playing?T.accent:T.muted,fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            {playing?"⏸":"▶"}
          </button>
          <div style={{flex:1,minWidth:160}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
              {MONTHS.filter((_,i)=>i%6===0).map((m,i)=><span key={i} style={{fontSize:7,color:T.dim,fontFamily:"JetBrains Mono"}}>{m.label}</span>)}
            </div>
            <input type="range" min="0" max={MONTHS.length-1} value={moIdx} onChange={e=>{setMoIdx(+e.target.value);setPlaying(false);}}/>
          </div>
          <div style={{flexShrink:0}}>
            <div style={{fontSize:14,fontWeight:700,color:T.accent,fontFamily:"Space Grotesk"}}>{curMo.label}</div>
            <div style={{fontSize:7.5,color:T.muted,fontFamily:"JetBrains Mono"}}>총 ${(totalFlow/1000).toFixed(2)}T</div>
          </div>
          <div style={{flexShrink:0,minWidth:80}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:7.5,color:T.muted,fontFamily:"JetBrains Mono",marginBottom:2}}>
              <span>속도</span><span style={{color:T.gold}}>{speed.toFixed(1)}×</span>
            </div>
            <input type="range" min=".3" max="5" step=".1" value={speed} onChange={e=>setSpeed(+e.target.value)}/>
          </div>
        </>}
        {/* 요약 */}
        <div style={{marginLeft:"auto",display:"flex",gap:12,fontSize:8.5,fontFamily:"JetBrains Mono"}}>
          <span>최대유입: <span style={{color:T.green,fontWeight:700}}>{REGIONS.reduce((a,r)=>{const v=flows.filter(f=>f.to===r.id).reduce((s,f)=>s+f.amt,0);return v>a.v?{n:r.name,v}:a;},{n:"",v:0}).n}</span></span>
          <span>최대유출: <span style={{color:T.red,fontWeight:700}}>{REGIONS.reduce((a,r)=>{const v=flows.filter(f=>f.from===r.id).reduce((s,f)=>s+f.amt,0);return v>a.v?{n:r.name,v}:a;},{n:"",v:0}).n}</span></span>
        </div>
      </div>

      {viewMode==="sankey"&&<SankeyView/>}
      {viewMode==="flowlines"&&(
        <div style={{flex:1,display:"flex",overflow:"hidden"}}>
          <FlowLinesView/>
          {/* 인사이트 사이드 */}
          <div style={{width:230,borderLeft:`1px solid ${T.border}`,overflowY:"auto",background:T.panel2,padding:"10px"}}>
            <div style={{fontSize:9,color:T.muted,fontFamily:"JetBrains Mono",fontWeight:700,marginBottom:8,letterSpacing:".1em"}}>💡 FLOW INSIGHTS</div>
            {[...flows].sort((a,b)=>b.amt-a.amt).slice(0,8).map((f,i)=>{
              const fr=REGIONS.find(r=>r.id===f.from),tr=REGIONS.find(r=>r.id===f.to);
              const prev=moIdx>0?f.amounts[moIdx-1]:f.amounts[0];
              const delta=f.amt-prev,chg=((delta/prev)*100).toFixed(1);
              return(
                <div key={i} style={{padding:"8px 9px",background:T.panel,borderRadius:4,marginBottom:5,border:`1px solid ${f.color}33`}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                    <span style={{fontSize:8.5,color:f.color,fontWeight:700,fontFamily:"JetBrains Mono"}}>{(fr&&fr.name)}→{(tr&&tr.name)}</span>
                    <span style={{fontSize:9,color:delta>=0?T.green:T.red,fontFamily:"JetBrains Mono",fontWeight:700}}>{delta>=0?"▲":"▼"}{Math.abs(chg)}%</span>
                  </div>
                  <div style={{fontSize:13,color:T.text,fontWeight:700,fontFamily:"JetBrains Mono",marginBottom:2}}>${f.amt}B</div>
                  <div style={{height:2,background:T.dim,borderRadius:1}}><div style={{width:`${(f.amt/(flows[0]&&flows[0].amt)||1)*100}%`,height:"100%",background:f.color}}/></div>
                  <div style={{fontSize:7,color:T.dim,fontFamily:"JetBrains Mono",marginTop:3}}>{f.label}</div>
                </div>
              );
            })}
          </div>
        </div>
      )}
      {viewMode==="map"&&(
        <div style={{flex:1,display:"flex",minHeight:0}}>
          {/* 지도 */}
          <div style={{flex:1,position:"relative",overflow:"hidden"}}>
            <svg width="100%" height="100%" viewBox="0 0 960 490" preserveAspectRatio="xMidYMid meet" style={{display:"block"}}>
              <defs>
                <radialGradient id="bgG" cx="50%" cy="45%" r="70%">
                  <stop offset="0%" stopColor="#080e20"/><stop offset="100%" stopColor="#04060d"/>
                </radialGradient>
                <filter id="glow"><feGaussianBlur stdDeviation="3.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                <filter id="glowXL"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                <filter id="nodeglow"><feGaussianBlur stdDeviation="8" in="SourceGraphic" result="b"/><feComposite in="SourceGraphic" in2="b" operator="over"/></filter>
              </defs>
              <rect width="960" height="490" fill="url(#bgG)"/>
              {[120,240,360,480,600,720,840].map(v=><line key={`gv${v}`} x1={v} y1="0" x2={v} y2="490" stroke="#0a1428" strokeWidth=".5"/>)}
              {[98,196,294,392].map(v=><line key={`gh${v}`} x1="0" y1={v} x2="960" y2={v} stroke="#0a1428" strokeWidth=".5"/>)}
              {MAP_PATHS.map((p,i)=><path key={i} d={p.d} fill={p.fill} stroke={p.stroke} strokeWidth=".8" opacity=".9"/>)}
              <line x1="0" y1="245" x2="960" y2="245" stroke="#122040" strokeWidth=".8" strokeDasharray="8 8" opacity=".6"/>

              {/* 자금흐름 — 두께 대폭 강화 + 레이블 항상 표시 */}
              {flows.map(f=>{
                const fr=REGIONS.find(r=>r.id===f.from),tr=REGIONS.find(r=>r.id===f.to);
                if(!fr||!tr)return null;
                const x1=fr.mapX*960,y1=fr.mapY*490,x2=tr.mapX*960,y2=tr.mapY*490;
                const mx=(x1+x2)/2+(y2-y1)*.22,my=(y1+y2)/2-(x2-x1)*.22;
                const dPath=`M${x1},${y1} Q${mx},${my} ${x2},${y2}`;
                const normW=f.amt/maxAmt;
                // v2: 두께를 훨씬 크게
                const baseW={xl:10,lg:7,md:4.5,sm:2.5}[f.tier];
                const w=baseW*(0.5+normW*.8);
                const isH=hover===`${f.from}-${f.to}`;
                const isSel=selRegion&&(f.from===selRegion||f.to===selRegion);
                const active=!selRegion||isSel;
                return(
                  <g key={`${f.from}-${f.to}`}
                    onMouseEnter={()=>setHover(`${f.from}-${f.to}`)}
                    onMouseLeave={()=>setHover(null)}
                    onClick={()=>{}}
                    style={{cursor:"pointer"}}>
                    {/* 글로우 레이어 */}
                    {(active)&&<path d={dPath} stroke={f.color} strokeWidth={w*3.5} strokeOpacity={isH?0.18:.05+(normW*.06)} fill="none" filter="url(#glowXL)"/>}
                    {/* 메인 라인 */}
                    <path d={dPath} stroke={f.color} strokeWidth={active?w:w*.3}
                      strokeOpacity={isH?0.98:active?0.45+(normW*.45):.06} fill="none"
                      strokeLinecap="round"/>
                    {/* 티어 XL/LG는 항상 금액 레이블 표시 */}
                    {(f.tier==="xl"||(f.tier==="lg"&&active)||isH)&&(
                      <g>
                        <rect x={mx-22} y={my-15} width="44" height="14" rx="3" fill="#040810" opacity=".88"/>
                        <text x={mx} y={my-4} textAnchor="middle" fill={f.color} fontSize={isH?11:9.5} fontWeight="700" fontFamily="JetBrains Mono" filter={f.tier==="xl"?"url(#glow)":"none"}>
                          ${f.amt}B
                        </text>
                      </g>
                    )}
                    {(f.tier==="md"&&active||isH)&&(
                      <text x={mx} y={my-6} textAnchor="middle" fill={f.color} fontSize="8.5" fontWeight="700" fontFamily="JetBrains Mono" opacity=".85">${f.amt}B</text>
                    )}
                    {isH&&<text x={mx} y={my+7} textAnchor="middle" fill="#c8d4e0" fontSize="8" fontFamily="JetBrains Mono" opacity=".85">{f.label}</text>}
                  </g>
                );
              })}

              {/* 파티클 */}
              {particles.current.map(p=><FloatParticle key={p.id} p={p}/>)}

              {/* 지역 노드 */}
              {REGIONS.map(r=>{
                const px=r.mapX*960,py=r.mapY*490;
                const pulse=Math.sin(tick*.055+r.mapX*9)*.1+.9;
                const inFlow=flows.filter(f=>f.to===r.id).reduce((s,f)=>s+f.amt,0);
                const outFlow=flows.filter(f=>f.from===r.id).reduce((s,f)=>s+f.amt,0);
                const net=inFlow-outFlow;
                const isSel=selRegion===r.id;
                const nc=net>40?T.green:net<-40?T.red:r.color;
                return(
                  <g key={r.id} onClick={()=>setSelRegion(p=>p===r.id?null:r.id)} style={{cursor:"pointer"}}>
                    <circle cx={px} cy={py} r={r.mapR*pulse*1.2} fill={r.color} opacity=".04"/>
                    {isSel&&<circle cx={px} cy={py} r={r.mapR*.85} fill="none" stroke={r.color} strokeWidth="2.5" opacity=".6" strokeDasharray="5 3"/>}
                    <circle cx={px} cy={py} r={r.mapR*.55} fill={r.color} opacity=".08" filter="url(#nodeglow)"/>
                    <circle cx={px} cy={py} r={r.mapR*.43} fill={T.panel2} stroke={r.color} strokeWidth={isSel?2.5:1.8} strokeOpacity={isSel?1:.75}/>
                    <text x={px} y={py-3} textAnchor="middle" fill={r.color} fontSize={r.mapR*.22+6} fontWeight="700" fontFamily="JetBrains Mono">{r.flag}</text>
                    <text x={px} y={py+10} textAnchor="middle" fill={r.color} fontSize="9.5" fontWeight="700" fontFamily="JetBrains Mono">{r.name}</text>
                    <text x={px} y={py+22} textAnchor="middle" fill={nc} fontSize="9" fontWeight="700" fontFamily="JetBrains Mono">
                      {net>10?`+${Math.round(net)}B`:net<-10?`${Math.round(net)}B`:""}
                    </text>
                  </g>
                );
              })}

              {/* 범례 */}
              <rect x="6" y="6" width="140" height="64" rx="4" fill="#04060d" opacity=".93"/>
              <text x="14" y="21" fill={T.muted} fontSize="9.5" fontFamily="JetBrains Mono" fontWeight="700">자금 규모 (두께)</text>
              {[["XL",">$200B","#ff3355",10],["LG","$100~200B","#ff9800",7],["MD","$50~100B","#f0b429",4.5],["SM","<$50B","#00e676",2.5]].map(([tier,rng,col,w],i)=>(
                <g key={tier} transform={`translate(10,${30+i*10})`}>
                  <line x1="0" y1="4" x2="26" y2="4" stroke={col} strokeWidth={w} opacity=".85" strokeLinecap="round"/>
                  <text x="32" y="8" fill={col} fontSize="8.5" fontFamily="JetBrains Mono">{tier}: {rng}</text>
                </g>
              ))}
            </svg>
          </div>

          {/* 사이드 패널 */}
          <div style={{width:240,borderLeft:`1px solid ${T.border}`,overflowY:"auto",background:T.panel2}}>
            {selRegion?(()=>{
              const r=REGIONS.find(x=>x.id===selRegion);if(!r)return null;
              const rFlows=flows.filter(f=>f.from===r.id||f.to===r.id).sort((a,b)=>b.amt-a.amt);
              const inFlow=flows.filter(f=>f.to===r.id).reduce((s,f)=>s+f.amt,0);
              const outFlow=flows.filter(f=>f.from===r.id).reduce((s,f)=>s+f.amt,0);
              const hs=Math.min(100,Math.max(0,Math.round(
                (r.gdpGrowth>2?12:r.gdpGrowth>0?5:-8)+
                (r.cpi<2.5&&r.cpi>0?10:r.cpi<4?4:-8)+
                (r.unemploy<4?12:r.unemploy<6?5:-6)+
                (r.pmi>52?10:r.pmi>50?4:-5)+
                (r.currentAcct>0?8:-4)+50
              )));
              return(
                <div style={{padding:"12px 10px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                    <span style={{fontSize:26}}>{r.flag}</span>
                    <div><div style={{fontSize:14,color:r.color,fontWeight:700,fontFamily:"Space Grotesk"}}>{r.name}</div>
                    <div style={{fontSize:8,color:T.muted,fontFamily:"JetBrains Mono"}}>{r.en}</div></div>
                    <ScoreRing score={hs} size={42}/>
                  </div>
                  <div style={{fontSize:8,color:T.muted,fontFamily:"JetBrains Mono",marginBottom:10,lineHeight:1.6}}>{r.description}</div>
                  {[{l:"GDP 성장",v:`${r.gdpGrowth}%`,g:r.gdpGrowth>1.5},{l:"CPI",v:`${r.cpi}%`,g:r.cpi<3},{l:"실업률",v:`${r.unemploy}%`,g:r.unemploy<5},{l:"PMI",v:r.pmi,g:r.pmi>50},{l:"기준금리",v:`${r.policyRate}%`,g:true},{l:"10Y금리",v:`${r.rate10y}%`,g:true},{l:"경상수지",v:`${r.currentAcct}%`,g:r.currentAcct>0}].map(item=>(
                    <div key={item.l} style={{display:"flex",justifyContent:"space-between",padding:"4px 6px",background:T.panel,borderRadius:3,marginBottom:2}}>
                      <span style={{fontSize:8,color:T.muted,fontFamily:"JetBrains Mono"}}>{item.l}</span>
                      <span style={{fontSize:9,fontWeight:700,color:item.g?T.green:T.red,fontFamily:"JetBrains Mono"}}>{item.v}</span>
                    </div>
                  ))}
                  <div style={{marginTop:8,marginBottom:5}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:8,fontFamily:"JetBrains Mono",fontWeight:700,marginBottom:4}}>
                      <span style={{color:T.green}}>유입 +${inFlow}B</span>
                      <span style={{color:T.red}}>유출 -${outFlow}B</span>
                    </div>
                    {rFlows.slice(0,5).map((f,i)=>{
                      const isIn=f.to===r.id;const other=REGIONS.find(x=>x.id===(isIn?f.from:f.to));
                      return(
                        <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 6px",background:T.panel,borderRadius:3,marginBottom:2,border:`1px solid ${isIn?T.green:T.red}22`}}>
                          <div style={{fontSize:8,color:T.text,fontFamily:"JetBrains Mono",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                            <span style={{color:isIn?T.green:T.red}}>{isIn?"←":"→"}</span> {(other&&other.name)}
                          </div>
                          <span style={{fontSize:9,fontWeight:700,color:isIn?T.green:T.red,fontFamily:"JetBrains Mono",marginLeft:4}}>${f.amt}B</span>
                        </div>
                      );
                    })}
                  </div>
                  <div style={{marginTop:6}}>
                    <div style={{fontSize:8,color:T.muted,fontFamily:"JetBrains Mono",fontWeight:700,marginBottom:4}}>KEY EVENTS</div>
                    {r.keyEvents.map((ev,i)=><div key={i} style={{fontSize:8,color:T.text,fontFamily:"JetBrains Mono",padding:"3px 6px",background:r.color+"10",borderLeft:`2px solid ${r.color}66`,marginBottom:2}}>{ev}</div>)}
                  </div>
                  <div style={{marginTop:8,padding:"8px",background:r.color+"10",borderRadius:4,border:`1px solid ${r.color}33`}}>
                    <div style={{fontSize:8,color:T.muted,fontFamily:"JetBrains Mono"}}>중앙은행: <span style={{color:r.color,fontWeight:700}}>{r.cbName}</span></div>
                    <div style={{fontSize:8,color:T.text,fontFamily:"JetBrains Mono",marginTop:2}}>다음 회의: <span style={{color:T.gold}}>{r.nextCB}</span></div>
                    <div style={{fontSize:8,color:T.text,fontFamily:"JetBrains Mono",marginTop:2}}>스탠스: <span style={{color:r.stanceDir>0?T.green:r.stanceDir<0?T.red:T.gold,fontWeight:700}}>{r.stance}</span></div>
                  </div>
                </div>
              );
            })():(
              <div style={{padding:"12px 10px"}}>
                <div style={{fontSize:9,color:T.muted,fontFamily:"JetBrains Mono",textAlign:"center",marginBottom:10,lineHeight:1.6}}>
                  지역 클릭 → 상세 보기
                </div>
                <div style={{fontSize:9,color:T.muted,fontFamily:"JetBrains Mono",fontWeight:700,marginBottom:6}}>TOP FLOWS · {curMo.label}</div>
                {[...flows].sort((a,b)=>b.amt-a.amt).slice(0,8).map((f,i)=>{
                  const fr=REGIONS.find(r=>r.id===f.from),tr=REGIONS.find(r=>r.id===f.to);
                  return(
                    <div key={i} style={{padding:"6px 8px",background:T.panel,borderRadius:4,marginBottom:4,border:`1px solid ${f.color}33`}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                        <span style={{fontSize:8,color:(fr&&fr.color),fontFamily:"JetBrains Mono",fontWeight:700}}>{(fr&&fr.name)}→{(tr&&tr.name)}</span>
                        <span style={{fontSize:9,fontWeight:700,color:f.color,fontFamily:"JetBrains Mono"}}>${f.amt}B</span>
                      </div>
                      <div style={{height:3,background:T.dim,borderRadius:1}}><div style={{width:`${(f.amt/maxAmt)*100}%`,height:"100%",background:f.color,borderRadius:1}}/></div>
                      <div style={{fontSize:7,color:T.dim,fontFamily:"JetBrains Mono",marginTop:2}}>{f.label}</div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════
   TAB 2: MACRO CHAIN v2 — 국가별 선택 + 세부 데이터 + 뉴스
════════════════════════════════════════════════════════════════ */

// 국가별 체인 세부 데이터

function MacroChainView(){
  const [hover,setHover]=useState(null);
  const [selNode,setSelNode]=useState(null);
  const [selRegion,setSelRegion]=useState("us"); // 국가 선택
  const [chainMode,setChainMode]=useState("global"); // "global" | "country"
  const [tick,setTick]=useState(0);
  const [newsOpen,setNewsOpen]=useState(false);
  useEffect(()=>{const iv=setInterval(()=>setTick(t=>t+1),60);return()=>clearInterval(iv);},[]);

  const W=720,H=420;
  const region=regionsLive.find(r=>r.id===selRegion)||REGIONS.find(r=>r.id===selRegion);
  const chainData=COUNTRY_CHAIN_DATA[selRegion]||COUNTRY_CHAIN_DATA.us;
  const news=COUNTRY_NEWS[selRegion]||[];

  // 국가별 노드 상태 색상
  function nodeStatusColor(nodeId){
    const d=chainData[nodeId];if(!d)return T.muted;
    if(d.status==="경보"||d.status==="역전"||d.status==="위험"||d.status==="금지"||d.status==="취약")return T.red;
    if(d.status==="주의"||d.status==="약세"||d.status==="엔저"||d.status==="절하"||d.status==="긴장")return T.orange;
    if(d.status==="양호"||d.status==="안정"||d.status==="강세"||d.status==="친화적"||d.status==="완화중"||d.status==="핵심"||d.status==="패권")return T.green;
    return T.gold;
  }

  const nodeColor=chainMode==="global"?n=>n.color:n=>(nodeStatusColor(n.id)||n.color);

  return(
    <div style={{display:"flex",height:"100%"}}>
      {/* 메인 영역 */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {/* 컨트롤 */}
        <div style={{padding:"7px 14px",background:T.panel2,borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <div style={{display:"flex",gap:3}}>
            <button className={`btn${chainMode==="global"?" a":""}`} onClick={()=>setChainMode("global")}>🌍 글로벌 연결고리</button>
            <button className={`btn${chainMode==="country"?" ga":""}`} onClick={()=>setChainMode("country")}>🏴 국가별 세부 분석</button>
          </div>
          {chainMode==="country"&&(
            <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
              {REGIONS.map(r=>(
                <button key={r.id} onClick={()=>setSelRegion(r.id)}
                  style={{padding:"3px 9px",borderRadius:3,border:`1px solid ${selRegion===r.id?r.color:T.border}`,
                    background:selRegion===r.id?r.color+"18":"transparent",color:selRegion===r.id?r.color:T.muted,
                    fontFamily:"JetBrains Mono",fontSize:9.5,cursor:"pointer",flexShrink:0}}>
                  {r.flag} {r.name}
                </button>
              ))}
            </div>
          )}
          {chainMode==="country"&&(
            <button className={`btn${newsOpen?" ra":""}`} onClick={()=>setNewsOpen(p=>!p)} style={{marginLeft:"auto",flexShrink:0}}>
              📰 {newsOpen?"뉴스 닫기":"뉴스 열기"}
            </button>
          )}
        </div>

        {/* SVG 차트 */}
        <div style={{flex:1,position:"relative",overflow:"hidden"}}>
          <svg width="100%" height="100%" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYMid meet" style={{display:"block"}}>
            <defs>
              <radialGradient id="cBg" cx="50%" cy="50%" r="70%"><stop offset="0%" stopColor="#080e1e"/><stop offset="100%" stopColor="#04060d"/></radialGradient>
              <filter id="cGlow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
              <filter id="cGlowHard"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
              <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
                <path d="M 0 0 L 6 3 L 0 6 Z" fill="#2a3a4a"/>
              </marker>
              <marker id="arrG" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
                <path d="M 0 0 L 6 3 L 0 6 Z" fill={T.green}/>
              </marker>
              <marker id="arrR" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
                <path d="M 0 0 L 6 3 L 0 6 Z" fill={T.red}/>
              </marker>
            </defs>
            <rect width={W} height={H} fill="url(#cBg)"/>

            {/* 국가 배너 */}
            {chainMode==="country"&&region&&(
              <g>
                <rect x="8" y="6" width="140" height="34" rx="4" fill={region.color+"15"} stroke={region.color+"55"} strokeWidth="1"/>

                <text x="38" y="20" fill={region.color} fontSize="11" fontWeight="700" fontFamily="Space Grotesk">{region.name}</text>
                <text x="18" y="33" fill={T.muted} fontSize="8" fontFamily="JetBrains Mono">{region.en} · {region.policyRate}% 기준금리</text>
              </g>
            )}

            {/* 엣지 */}
            {CHAIN_EDGES.map(e=>{
              const fn=CHAIN_NODES.find(n=>n.id===e.from),tn=CHAIN_NODES.find(n=>n.id===e.to);if(!fn||!tn)return null;
              const x1=fn.x*W,y1=fn.y*H,x2=tn.x*W,y2=tn.y*H;
              const mx=(x1+x2)/2+(y2-y1)*.2,my=(y1+y2)/2-(x2-x1)*.2;
              const isH=hover===`${e.from}-${e.to}`;
              const isSel=selNode&&(e.from===selNode||e.to===selNode);
              const active=!selNode||isSel;

              // 국가 모드: 양쪽 노드 상태로 엣지 색상 결정
              let edgeCol=e.color;
              if(chainMode==="country"){
                const fStatus=nodeStatusColor(e.from),tStatus=nodeStatusColor(e.to);
                if(fStatus===T.red||tStatus===T.red)edgeCol=T.red+"cc";
                else if(fStatus===T.orange||tStatus===T.orange)edgeCol=T.orange+"cc";
                else edgeCol=T.green+"cc";
              }
              const sw=e.weight*(isH?2:1)*.9;
              const col=isH?edgeCol:(active?edgeCol:T.dim);
              const op=isH?0.95:active?0.4+(e.weight*.08):.07;
              const markerEnd=isH&&chainMode==="country"?(edgeCol===T.red+"cc"?"url(#arrR)":"url(#arrG)"):"url(#arr)";
              return(
                <g key={`${e.from}-${e.to}`}
                  onMouseEnter={()=>setHover(`${e.from}-${e.to}`)}
                  onMouseLeave={()=>setHover(null)}
                  style={{cursor:"pointer"}}>
                  {isH&&<path d={`M${x1},${y1} Q${mx},${my} ${x2},${y2}`} stroke={col} strokeWidth={sw*4} strokeOpacity=".07" fill="none" filter="url(#cGlowHard)"/>}
                  <path d={`M${x1},${y1} Q${mx},${my} ${x2},${y2}`}
                    stroke={col} strokeWidth={sw} strokeOpacity={op} fill="none"
                    markerEnd={markerEnd}
                    strokeDasharray={isH?"none":"8 4"}/>
                  {(isH||isSel)&&<text x={mx} y={my} textAnchor="middle" dy="-7" fill={col} fontSize="9" fontWeight="700" fontFamily="JetBrains Mono" opacity=".9">{e.label}</text>}
                </g>
              );
            })}

            {/* 노드 */}
            {CHAIN_NODES.map(n=>{
              const px=n.x*W,py=n.y*H;
              const pulse=Math.sin(tick*.05+n.x*7)*.08+.92;
              const isSel=selNode===n.id;
              const isConn=selNode&&CHAIN_EDGES.some(e=>e.from===selNode&&e.to===n.id||e.to===selNode&&e.from===n.id);
              const active=!selNode||isSel||isConn;
              const nc=chainMode==="country"?nodeStatusColor(n.id):n.color;
              const sz=isSel?54:44;
              const cd=chainData[n.id];

              return(
                <g key={n.id} onClick={()=>setSelNode(p=>p===n.id?null:n.id)} style={{cursor:"pointer"}}>
                  <circle cx={px} cy={py} r={sz*.9*pulse} fill={nc} opacity={active?0.05:.015}/>
                  {isSel&&<circle cx={px} cy={py} r={sz*.78} fill="none" stroke={nc} strokeWidth="2" strokeDasharray="5 3" opacity=".7"/>}
                  <circle cx={px} cy={py} r={sz*.5} fill={nc} opacity=".08" filter="url(#cGlow)"/>
                  <circle cx={px} cy={py} r={sz*.44} fill={T.panel2} stroke={nc} strokeWidth={isSel?2.8:1.8} opacity={active?1:.3}/>
                  <text x={px} y={py-5} textAnchor="middle" fill={nc} fontSize={isSel?15:13} opacity={active?1:.3}>{n.icon}</text>
                  <text x={px} y={py+7} textAnchor="middle" fill={nc} fontSize="9" fontWeight="700" fontFamily="JetBrains Mono" opacity={active?1:.3}>{n.label}</text>
                  {/* 국가 모드: 상태 배지 */}
                  {chainMode==="country"&&cd&&(
                    <g>
                      <rect x={px-20} y={py+12} width="40" height="12" rx="3" fill={nc+"30"} stroke={nc+"60"}/>
                      <text x={px} y={py+21} textAnchor="middle" fill={nc} fontSize="7" fontWeight="700" fontFamily="JetBrains Mono">{cd.status}</text>
                    </g>
                  )}
                  {/* 글로벌 모드: 서브레이블 */}
                  {chainMode==="global"&&<text x={px} y={py+18} textAnchor="middle" fill={T.muted} fontSize="7.5" fontFamily="JetBrains Mono" opacity={active?0.8:.2}>{n.sub}</text>}
                </g>
              );
            })}

            {/* 범례 (국가 모드) */}
            {chainMode==="country"&&(
              <g transform={`translate(${W-130},6)`}>
                <rect x="0" y="0" width="122" height="52" rx="4" fill="#04060d" opacity=".92" stroke={T.border}/>
                <text x="8" y="16" fill={T.muted} fontSize="8" fontFamily="JetBrains Mono" fontWeight="700">노드 상태</text>
                {[[T.green,"양호·안정·친화적"],[T.gold,"주의·모니터링"],[T.orange,"경고·부담"],[T.red,"경보·위험"]].map(([c,l],i)=>(
                  <g key={i} transform={`translate(8,${22+i*8})`}>
                    <circle cx="5" cy="3" r="4" fill={c} opacity=".8"/>
                    <text x="13" y="7" fill={c} fontSize="7.5" fontFamily="JetBrains Mono">{l}</text>
                  </g>
                ))}
              </g>
            )}
          </svg>
        </div>
      </div>

      {/* 오른쪽 사이드 패널 */}
      <div style={{width:260,borderLeft:`1px solid ${T.border}`,overflowY:"auto",background:T.panel2,display:"flex",flexDirection:"column"}}>
        {/* 뉴스 섹션 */}
        {chainMode==="country"&&newsOpen&&(
          <div style={{borderBottom:`1px solid ${T.border}`,background:"#060c18"}}>
            <div style={{padding:"8px 10px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:9,color:T.muted,fontFamily:"JetBrains Mono",fontWeight:700}}>
                📰 {(region&&region.name)} 주요 뉴스
              </span>
              <span style={{fontSize:7,color:T.dim,fontFamily:"JetBrains Mono"}}>Google News 링크</span>
            </div>
            {news.map((n,i)=>(
              <a key={i} href={n.url} target="_blank" rel="noopener"
                style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",borderBottom:`1px solid ${T.border}`,
                  textDecoration:"none",cursor:"pointer",background:"transparent",
                  transition:"background .15s"}}
                onMouseEnter={e=>e.currentTarget.style.background=T.dim+"66"}
                onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <span style={{fontSize:16,flexShrink:0}}>{(region&&region.flag)}</span>
                <div style={{flex:1,overflow:"hidden"}}>
                  <div style={{fontSize:8.5,color:T.accent,fontFamily:"JetBrains Mono",fontWeight:700,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{n.title}</div>
                  <div style={{fontSize:7,color:T.muted,fontFamily:"JetBrains Mono",marginTop:1}}>🔗 {n.src}</div>
                </div>
                <span style={{fontSize:9,color:T.dim,flexShrink:0}}>↗</span>
              </a>
            ))}
          </div>
        )}

        {/* 노드 상세 / 글로벌 체인 설명 */}
        <div style={{flex:1,padding:"10px 10px",overflowY:"auto"}}>
          {selNode&&chainMode==="country"?(()=>{
            const n=CHAIN_NODES.find(x=>x.id===selNode);if(!n)return null;
            const cd=chainData[selNode];if(!cd)return null;
            const nc=nodeStatusColor(selNode);
            const outEdges=CHAIN_EDGES.filter(e=>e.from===selNode);
            const inEdges=CHAIN_EDGES.filter(e=>e.to===selNode);
            return(
              <div>
                <div style={{padding:"10px",background:nc+"12",borderRadius:5,border:`1px solid ${nc}44`,marginBottom:10}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                    <span style={{fontSize:18}}>{n.icon}</span>
                    <div>
                      <div style={{fontSize:13,color:nc,fontWeight:700,fontFamily:"Space Grotesk"}}>{n.label}</div>
                      <div style={{fontSize:8,color:T.muted,fontFamily:"JetBrains Mono"}}>{n.sub}</div>
                    </div>
                    <div style={{marginLeft:"auto",padding:"3px 9px",background:nc+"20",borderRadius:3,border:`1px solid ${nc}66`}}>
                      <div style={{fontSize:8,color:nc,fontFamily:"JetBrains Mono",fontWeight:700}}>{cd.status}</div>
                    </div>
                  </div>
                  <div style={{fontSize:10,color:T.text,fontFamily:"Space Grotesk",fontWeight:700,marginBottom:4}}>{cd.title}</div>
                  <div style={{fontSize:12,color:nc,fontFamily:"JetBrains Mono",fontWeight:700,marginBottom:4}}>{cd.value}</div>
                  <div style={{fontSize:8.5,color:T.muted,fontFamily:"JetBrains Mono",lineHeight:1.7}}>{cd.detail}</div>
                </div>
                {inEdges.length>0&&(<>
                  <div style={{fontSize:8,color:T.green,fontFamily:"JetBrains Mono",fontWeight:700,marginBottom:4}}>← {(region&&region.name)}에서 영향 받는 요인</div>
                  {inEdges.map(e=>{const fn=CHAIN_NODES.find(x=>x.id===e.from);const fc=chainData[e.from];return(
                    <div key={e.from} style={{padding:"6px 8px",background:T.panel,borderRadius:3,marginBottom:3,border:`1px solid ${nodeStatusColor(e.from)}22`}}>
                      <div style={{fontSize:9,color:nodeStatusColor(e.from),fontFamily:"JetBrains Mono",fontWeight:700}}>{(fn&&fn.icon)} {(fn&&fn.label)}</div>
                      <div style={{fontSize:8,color:T.text,fontFamily:"JetBrains Mono"}}>{e.label}</div>
                      {fc&&<div style={{fontSize:7,color:T.muted,fontFamily:"JetBrains Mono",marginTop:1}}>{fc.value}</div>}
                    </div>
                  );})}
                </>)}
                {outEdges.length>0&&(<>
                  <div style={{fontSize:8,color:T.red,fontFamily:"JetBrains Mono",fontWeight:700,marginTop:8,marginBottom:4}}>→ {(region&&region.name)}에 영향 주는 요인</div>
                  {outEdges.map(e=>{const tn=CHAIN_NODES.find(x=>x.id===e.to);const tc=chainData[e.to];return(
                    <div key={e.to} style={{padding:"6px 8px",background:T.panel,borderRadius:3,marginBottom:3,border:`1px solid ${nodeStatusColor(e.to)}22`}}>
                      <div style={{fontSize:9,color:nodeStatusColor(e.to),fontFamily:"JetBrains Mono",fontWeight:700}}>{(tn&&tn.icon)} {(tn&&tn.label)}</div>
                      <div style={{fontSize:8,color:T.text,fontFamily:"JetBrains Mono"}}>{e.label}</div>
                      {tc&&<div style={{fontSize:7,color:T.muted,fontFamily:"JetBrains Mono",marginTop:1}}>{tc.value}</div>}
                    </div>
                  );})}
                </>)}
              </div>
            );
          })():selNode&&chainMode==="global"?(()=>{
            const n=CHAIN_NODES.find(x=>x.id===selNode);if(!n)return null;
            const outEdges=CHAIN_EDGES.filter(e=>e.from===selNode);
            const inEdges=CHAIN_EDGES.filter(e=>e.to===selNode);
            return(
              <div>
                <div style={{padding:"10px",background:n.color+"12",borderRadius:5,border:`1px solid ${n.color}44`,marginBottom:10}}>
                  <div style={{fontSize:14,color:n.color,fontWeight:700,fontFamily:"Space Grotesk"}}>{n.icon} {n.label}</div>
                  <div style={{fontSize:8,color:T.muted,fontFamily:"JetBrains Mono"}}>{n.sub}</div>
                </div>
                {inEdges.length>0&&(<>
                  <div style={{fontSize:8,color:T.green,fontFamily:"JetBrains Mono",fontWeight:700,marginBottom:4}}>← 영향 받는 요인</div>
                  {inEdges.map(e=>{const fn=CHAIN_NODES.find(x=>x.id===e.from);return(<div key={e.from} style={{padding:"5px 8px",background:T.panel,borderRadius:3,marginBottom:3,border:`1px solid ${e.color}22`}}><div style={{fontSize:9,color:e.color,fontFamily:"JetBrains Mono"}}>{(fn&&fn.icon)} {(fn&&fn.label)}</div><div style={{fontSize:8,color:T.muted,fontFamily:"JetBrains Mono"}}>{e.label}</div><div style={{fontSize:7,color:T.dim,fontFamily:"JetBrains Mono"}}>{e.desc}</div></div>);})}
                </>)}
                {outEdges.length>0&&(<>
                  <div style={{fontSize:8,color:T.red,fontFamily:"JetBrains Mono",fontWeight:700,marginTop:8,marginBottom:4}}>→ 영향 주는 요인</div>
                  {outEdges.map(e=>{const tn=CHAIN_NODES.find(x=>x.id===e.to);return(<div key={e.to} style={{padding:"5px 8px",background:T.panel,borderRadius:3,marginBottom:3,border:`1px solid ${e.color}22`}}><div style={{fontSize:9,color:e.color,fontFamily:"JetBrains Mono"}}>{(tn&&tn.icon)} {(tn&&tn.label)}</div><div style={{fontSize:8,color:T.text,fontFamily:"JetBrains Mono"}}>{e.label}</div><div style={{fontSize:7,color:T.dim,fontFamily:"JetBrains Mono"}}>{e.desc}</div></div>);})}
                </>)}
              </div>
            );
          })():(
            <div>
              {chainMode==="country"&&region?(
                <>
                  {/* 국가 전체 현황 */}
                  <div style={{padding:"10px",background:region.color+"10",borderRadius:5,border:`1px solid ${region.color}33`,marginBottom:10}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                      <span style={{fontSize:22}}>{region.flag}</span>
                      <div>
                        <div style={{fontSize:14,color:region.color,fontWeight:700,fontFamily:"Space Grotesk"}}>{region.name}</div>
                        <div style={{fontSize:8,color:T.muted,fontFamily:"JetBrains Mono"}}>{region.cbName} · {region.policyRate}%
                         {region.id==="kr"&&ecosLive&&<span style={{color:T.green,fontSize:7,marginLeft:6,fontFamily:"JetBrains Mono"}}>● ECOS LIVE</span>}
                         {region.id==="kr"&&krBop.length>0&&(
                           <span style={{color:T.accent,fontSize:7.5,marginLeft:6,fontFamily:"JetBrains Mono"}}>
                             경상수지 {krBop[krBop.length-1].date}: {krBop[krBop.length-1].value>0?"+":""}{krBop[krBop.length-1].value}억$
                           </span>
                         )}
                       </div>
                      </div>
                    </div>
                    <div style={{fontSize:8,color:T.muted,fontFamily:"JetBrains Mono",lineHeight:1.6}}>{region.description}</div>
                  </div>
                  <div style={{fontSize:8,color:T.muted,fontFamily:"JetBrains Mono",fontWeight:700,marginBottom:6}}>체인 노드 현황 요약</div>
                  {Object.entries(chainData).map(([k,cd])=>{
                    const n=CHAIN_NODES.find(x=>x.id===k);if(!n)return null;
                    const nc=nodeStatusColor(k);
                    return(
                      <div key={k} onClick={()=>setSelNode(p=>p===k?null:k)} style={{display:"flex",alignItems:"center",gap:7,padding:"6px 8px",background:T.panel,borderRadius:3,marginBottom:3,cursor:"pointer",border:`1px solid ${nc}22`}}>
                        <span style={{fontSize:12}}>{n.icon}</span>
                        <div style={{flex:1,overflow:"hidden"}}>
                          <div style={{fontSize:8.5,color:nc,fontFamily:"JetBrains Mono",fontWeight:700}}>{n.label}</div>
                          <div style={{fontSize:7.5,color:T.muted,fontFamily:"JetBrains Mono",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{cd.value}</div>
                        </div>
                        <div style={{padding:"2px 6px",background:nc+"20",borderRadius:2,border:`1px solid ${nc}55`}}>
                          <div style={{fontSize:7,color:nc,fontFamily:"JetBrains Mono",fontWeight:700,whiteSpace:"nowrap"}}>{cd.status}</div>
                        </div>
                      </div>
                    );
                  })}
                </>
              ):(
                <>
                  <div style={{fontSize:9,color:T.muted,fontFamily:"JetBrains Mono",fontWeight:700,marginBottom:6,letterSpacing:".1em"}}>MACRO TRANSMISSION MAP</div>
                  <div style={{fontSize:8,color:T.muted,fontFamily:"JetBrains Mono",lineHeight:1.7,marginBottom:10}}>
                    노드 클릭 → 연결 경로 확인<br/>
                    「국가별 세부 분석」탭에서 국가 선택 후 각 노드의 실제 데이터를 확인하세요.
                  </div>
                  <div style={{fontSize:8,color:T.muted,fontFamily:"JetBrains Mono",fontWeight:700,marginBottom:6}}>핵심 전달 경로 (strength 3)</div>
                  {CHAIN_EDGES.filter(e=>e.weight===3).map(e=>{
                    const fn=CHAIN_NODES.find(n=>n.id===e.from),tn=CHAIN_NODES.find(n=>n.id===e.to);
                    return(<div key={`${e.from}-${e.to}`} style={{padding:"6px 8px",background:T.panel,borderRadius:4,marginBottom:4,border:`1px solid ${e.color}33`}}>
                      <div style={{fontSize:8.5,color:e.color,fontFamily:"JetBrains Mono",fontWeight:700}}>{(fn&&fn.icon)} → {(tn&&tn.icon)}</div>
                      <div style={{fontSize:8,color:T.text,fontFamily:"JetBrains Mono"}}>{e.label}</div>
                      <div style={{fontSize:7,color:T.muted,fontFamily:"JetBrains Mono",marginTop:2}}>{e.desc}</div>
                    </div>);
                  })}
                </>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════
   TAB 3: TIMELINE — 스냅샷 + 타임라인
════════════════════════════════════════════════════════════════ */
function TimelineView(){
  const [moIdx,setMoIdx]=useState(MONTHS.length-1);
  const [playing,setPlaying]=useState(false);
  const [speed,setSpeed]=useState(1.0);
  const [viewMode,setViewMode]=useState("snapshot");
  const playRef=useRef(null);

  useEffect(()=>{if(playing){playRef.current=setInterval(()=>setMoIdx(m=>{if(m>=MONTHS.length-1){setPlaying(false);return m;}return m+1;}),Math.round(900/speed));}return()=>clearInterval(playRef.current);},[playing,speed]);

  const curFlows=useMemo(()=>FLOWS.map(f=>({...f,amt:f.amounts[moIdx]})),[moIdx]);
  const topFlows=useMemo(()=>[...curFlows].sort((a,b)=>b.amt-a.amt).slice(0,12),[curFlows]);
  const totalIn=useMemo(()=>REGIONS.map(r=>({...r,inflow:curFlows.filter(f=>f.to===r.id).reduce((s,f)=>s+f.amt,0),outflow:curFlows.filter(f=>f.from===r.id).reduce((s,f)=>s+f.amt,0)})),[curFlows]);
  const curMo=MONTHS[moIdx];

  function downloadCSV(){
    const rows=[["Month","From","To","Amount(B)","Label","Tier"]];
    MONTHS.forEach((mo,mi)=>{FLOWS.forEach(f=>{rows.push([mo.label,f.from,f.to,f.amounts[mi],f.label,f.tier]);});});
    const csv=rows.map(r=>r.map(v=>`"${v}"`).join(",")).join("\n");
    const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download="global_capital_flows.csv";a.click();
  }

  function downloadJSON(){
    const data={metadata:{generated:new Date().toISOString(),months:MONTHS.length,flows:FLOWS.length},
      regions:REGIONS.map(r=>({id:r.id,name:r.name,gdpGrowth:r.gdpGrowth,cpi:r.cpi,policyRate:r.policyRate,rate10y:r.rate10y})),
      flows:FLOWS.map(f=>({from:f.from,to:f.to,label:f.label,tier:f.tier,monthlyAmounts:MONTHS.map((m,i)=>({month:m.label,amount:f.amounts[i]}))}))};
    const a=document.createElement("a");a.href="data:application/json;charset=utf-8,"+encodeURIComponent(JSON.stringify(data,null,2));a.download="global_macro_flows.json";a.click();
  }

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{padding:"8px 14px",background:T.panel2,borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
        <div style={{display:"flex",gap:4}}>
          <button className={`btn${viewMode==="snapshot"?" a":""}`} onClick={()=>setViewMode("snapshot")}>📸 스냅샷</button>
          <button className={`btn${viewMode==="timeline"?" a":""}`} onClick={()=>setViewMode("timeline")}>📅 타임라인</button>
          <button className={`btn${viewMode==="heatmap"?" a":""}`} onClick={()=>setViewMode("heatmap")}>🔥 히트맵</button>
        </div>
        <button onClick={()=>setPlaying(p=>!p)} style={{padding:"4px 12px",borderRadius:3,border:`1px solid ${playing?T.accent:T.border}`,background:playing?T.accent+"20":"transparent",color:playing?T.accent:T.muted,fontFamily:"JetBrains Mono",fontSize:10,cursor:"pointer"}}>
          {playing?"⏸ 정지":"▶ 재생"}
        </button>
        <div style={{flex:1,minWidth:200}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
            {MONTHS.filter((_,i)=>i%3===0).map((m,i)=><span key={i} style={{fontSize:7,color:T.dim,fontFamily:"JetBrains Mono"}}>{m.label.slice(2)}</span>)}
          </div>
          <input type="range" min="0" max={MONTHS.length-1} value={moIdx} onChange={e=>{setMoIdx(+e.target.value);setPlaying(false);}}/>
        </div>
        <div style={{fontFamily:"Space Grotesk",fontSize:14,fontWeight:700,color:T.accent,minWidth:65}}>{curMo.label}</div>
        <div style={{display:"flex",gap:4}}>
          <button className="btn ga" onClick={downloadCSV}>⬇ CSV</button>
          <button className="btn pa" onClick={downloadJSON}>⬇ JSON</button>
        </div>
      </div>

      <div style={{flex:1,overflow:"auto",padding:"12px 14px"}}>
        {viewMode==="snapshot"&&(
          <div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:12}}>
              {totalIn.map(r=>{
                const net=r.inflow-r.outflow;
                return(
                  <div key={r.id} style={{background:T.panel,border:`1px solid ${r.color}44`,borderRadius:5,padding:"10px 12px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <span style={{fontSize:16}}>{r.flag}</span>
                        <span style={{fontSize:11,color:r.color,fontWeight:700,fontFamily:"Space Grotesk"}}>{r.name}</span>
                      </div>
                      <span style={{fontSize:10,color:net>0?T.green:T.red,fontWeight:700,fontFamily:"JetBrains Mono"}}>{net>0?"+":""}${Math.round(net)}B</span>
                    </div>
                    <div style={{display:"flex",gap:10,marginBottom:6}}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:7,color:T.muted,fontFamily:"JetBrains Mono",marginBottom:1}}>유입</div>

            {FLOWS.map(f=>{

                <div key={`${f.from}-${f.to}`} style={{background:T.panel,borderRadius:4,padding:"8px 10px",marginBottom:5,border:`1px solid ${f.color}22`}}>

                    {f.amounts.map((v,i)=>{const bh=(v/maxV)*38;const isCur=i===moIdx;return(

                  </div>
                </div>
              );
            })}
          </div>

        {viewMode==="heatmap"&&(
          <div>
            <div style={{fontSize:9,color:T.muted,fontFamily:"JetBrains Mono",fontWeight:700,marginBottom:8}}>지역간 자금 흐름 매트릭스 (현재: {curMo.label})</div>
            <div style={{overflowX:"auto"}}>
              <table style={{borderCollapse:"collapse",fontFamily:"JetBrains Mono",fontSize:9,minWidth:600}}>
                <thead>
                  <tr>
                    <th style={{padding:"6px 10px",color:T.muted,textAlign:"left",borderBottom:`1px solid ${T.border}`,fontSize:8}}>FROM↓ TO→</th>
                    {REGIONS.map(r=><th key={r.id} style={{padding:"6px 8px",color:r.color,fontSize:8,borderBottom:`1px solid ${T.border}`,fontWeight:700,minWidth:62}}>{r.flag}{r.name}</th>)}
                    <th style={{padding:"6px 8px",color:T.gold,fontSize:8,borderBottom:`1px solid ${T.border}`,fontWeight:700}}>총유출</th>
                  </tr>
                </thead>
                <tbody>
                  {REGIONS.map(fr=>{
                    const rowFlows=REGIONS.map(tr=>{if(fr.id===tr.id)return null;return curFlows.find(f=>f.from===fr.id&&f.to===tr.id)||null;});
                    const rowTotal=rowFlows.reduce((s,f)=>s+((f&&f.amt)||0),0);
                    return(
                      <tr key={fr.id}>
                        <td style={{padding:"6px 10px",color:fr.color,fontWeight:700,borderBottom:`1px solid ${T.border}22`,whiteSpace:"nowrap"}}>{fr.flag} {fr.name}</td>
                        {REGIONS.map((tr,i)=>{
                          const f=rowFlows[i];
                          if(fr.id===tr.id)return<td key={tr.id} style={{padding:"6px 8px",background:T.dim+"44",borderBottom:`1px solid ${T.border}22`}}>—</td>;
                          if(!f)return<td key={tr.id} style={{padding:"6px 8px",color:T.dim,textAlign:"right",borderBottom:`1px solid ${T.border}22`}}>·</td>;
                          const bg=`rgba(0,212,255,${Math.min((f.amt/300)*.4,.4)})`;
                          return(<td key={tr.id} style={{padding:"6px 8px",background:bg,color:T.accent,fontWeight:700,textAlign:"right",borderBottom:`1px solid ${T.border}22`}}>${f.amt}</td>);
                        })}
                        <td style={{padding:"6px 8px",color:T.red,fontWeight:700,textAlign:"right",borderBottom:`1px solid ${T.border}22`,borderLeft:`1px solid ${T.border}`}}>${rowTotal}B</td>
                      </tr>
                    );
                  })}
                  <tr>
                    <td style={{padding:"6px 10px",color:T.gold,fontWeight:700,fontSize:8}}>총유입</td>
                    {REGIONS.map(tr=>{const total=curFlows.filter(f=>f.to===tr.id).reduce((s,f)=>s+f.amt,0);return<td key={tr.id} style={{padding:"6px 8px",color:T.green,fontWeight:700,textAlign:"right",borderTop:`1px solid ${T.border}`}}>{total?`$${total}B`:""}</td>;})}
                    <td/>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}
